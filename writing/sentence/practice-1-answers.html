<!DOCTYPE html>
<!-- toefl-reps-demo: migrated from kickstart-hw -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build a Sentence — 解答解説</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f7fa;color:#0F1511;line-height:1.8}
.header{background:linear-gradient(135deg,#0F1511,#4a5568);color:#fff;padding:28px 24px;text-align:center}
.header h1{font-size:1.5em;margin-bottom:4px}
.header p{font-size:.85em;opacity:.8}
.score-summary{max-width:880px;margin:24px auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:24px;text-align:center}
.score-big{font-size:2.8em;font-weight:700;color:#4a90d9;margin:8px 0}
.score-sub{font-size:.85em;color:#718096}
.score-bar{height:8px;background:#e2e8f0;border-radius:4px;margin:16px auto;max-width:300px}
.score-bar-fill{height:100%;background:#4a90d9;border-radius:4px}
.container{max-width:880px;margin:0 auto;padding:0 20px 40px}
.tips-card{background:#fff;border-left:4px solid #4a90d9;margin:20px 0;padding:20px 24px;border-radius:0 8px 8px 0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tips-card h2{font-size:1em;color:#4a90d9;margin-bottom:12px}
.step-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:700px){.step-grid{grid-template-columns:1fr}}
.step{background:#ebf4ff;border-radius:8px;padding:14px;text-align:center}
.step-num{display:inline-block;background:#4a90d9;color:#fff;width:28px;height:28px;line-height:28px;border-radius:50%;font-size:.8em;font-weight:700;margin-bottom:6px}
.step h4{font-size:.85em;margin-bottom:4px}
.step p{font-size:.75em;color:#4a5568}
.q-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.q-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #edf2f7}
.q-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8em;color:#fff;flex-shrink:0}
.q-num.correct{background:#38a169}
.q-num.wrong{background:#e53e3e}
.q-num.default{background:#4a90d9}
.q-prompt{font-size:.88em;color:#718096;flex:1;font-style:italic}
.q-body{padding:14px 18px}
.q-sentence{font-size:.92em;font-weight:600;color:#0F1511;margin-bottom:6px}
.q-grammar{font-size:.8em;color:#718096;background:#f7fafc;padding:8px 12px;border-radius:6px;border-left:3px solid #4a90d9}
.q-user{font-size:.82em;margin-bottom:6px;padding:6px 10px;border-radius:6px}
.q-user.is-correct{background:#f0fff4;color:#22543d}
.q-user.is-wrong{background:#fff5f5;color:#9b2c2c}
.nav-bottom{text-align:center;padding:24px 0}
.btn-back{display:inline-block;padding:12px 32px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:.95em;font-weight:600;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <h1>🔤 Build a Sentence — 解答解説</h1>
  <p>Kickstart Day 3 Homework | 14問</p>
</div>

<div class="score-summary">
  <p class="score-sub">あなたのスコア</p>
  <div class="score-big" id="scoreBig">— / 14</div>
  <div class="score-bar"><div class="score-bar-fill" id="scoreBar" style="width:0%"></div></div>
  <p class="score-sub" id="scoreMsg"></p>
</div>

<div class="container">

<div class="tips-card">
  <h2>💡 Build a Sentence 攻略 3ステップ</h2>
  <div class="step-grid">
    <div class="step"><div class="step-num">1</div><h4>主語と動詞を見つける</h4><p>「誰が（主語）」「どうする（動詞）」を最初に探す。この2つが文の骨格。</p></div>
    <div class="step"><div class="step-num">2</div><h4>骨格を作る</h4><p>S+V を組み合わせて基本形を作る。文型（SV, SVC, SVO）を意識。</p></div>
    <div class="step"><div class="step-num">3</div><h4>残りを配置</h4><p>修飾語、前置詞句、接続詞を適切な位置に。最後に音読チェック（5秒）。</p></div>
  </div>
</div>

<div id="qList"></div>

</div>

<div class="nav-bottom">
  <a class="btn-back" href="build-sentence.html">← もう一度解く</a>
  <a class="btn-back" href="../menu.html" style="background:#0F1511;color:#fff;border-color:#0F1511">📋 メニューに戻る</a>
</div>

<script>
const answers=[
{id:1,prompt:"Are you going to the concert tonight?",sentence:"I do not like that kind of music.",grammar:"否定文: S + do not + V。「that kind of」は「その種類の」。"},
{id:2,prompt:"Did you enjoy the book I recommended?",sentence:"Yes, it was one of the best books I have read.",grammar:"最上級 + 関係代名詞省略: one of the best + N + S + have + Vpp。"},
{id:3,prompt:"Why didn't you come to class yesterday?",sentence:"I had a doctor's appointment that I could not reschedule.",grammar:"関係代名詞 that: appointment that I could not reschedule。過去形 had。"},
{id:4,prompt:"Have you decided what to major in yet?",sentence:"I have not made a final decision yet.",grammar:"現在完了の否定: S + have not + Vpp。yet は文末。"},
{id:5,prompt:"What did you think of the guest speaker?",sentence:"The examples she used to explain the topic were really interesting.",grammar:"関係代名詞省略: examples (that) she used。S(examples) + were + C(interesting)。"},
{id:6,prompt:"Can you help me move this weekend?",sentence:"Sure, just let me know what time works best.",grammar:"間接疑問文: what time works best。let me know + wh節。"},
{id:7,prompt:"How was your job interview this morning?",sentence:"I was nervous at first, but it went well.",grammar:"等位接続詞 but: 2つの独立節をコンマ+butで接続。at first = 最初は。"},
{id:8,prompt:"Do you know where the nearest post office is?",sentence:"There is one right across the street from the library.",grammar:"There is構文 + 場所の前置詞句: across the street from ~。"},
{id:9,prompt:"What are you planning to do after graduation?",sentence:"I am thinking about applying for a job abroad.",grammar:"進行形 + 前置詞: am thinking about + Ving。for a job abroad。"},
{id:10,prompt:"Why do you always take the bus instead of driving?",sentence:"Taking the bus is much cheaper and I can avoid traffic.",grammar:"動名詞主語: Taking the bus is ~。比較級 much cheaper。"},
{id:11,prompt:"Would you like to join our study group?",sentence:"That sounds great, especially since the exam is coming up soon.",grammar:"since節（理由）: since the exam is coming up。especially で強調。"},
{id:12,prompt:"Did you hear about the new campus policy?",sentence:"No, I have not heard anything about it.",grammar:"現在完了の否定: have not heard。anything（否定文での不定代名詞）。"},
{id:13,prompt:"What's the best way to prepare for the TOEFL?",sentence:"I would recommend practicing with timed exercises every day.",grammar:"would recommend + Ving: 丁寧な提案表現。前置詞 with。"},
{id:14,prompt:"How did you learn to cook so well?",sentence:"My grandmother taught me her recipes when I was young.",grammar:"SVOO: taught me her recipes。時の副詞節: when I was young。"}
];

const stored=(JSON.parse(sessionStorage.getItem('sentenceAnswers')||'null')||(window.Review?Review.loadAttempt('sentence',1):null));
let score=0;

if(stored){
  score=stored.score||0;
  document.getElementById('scoreBig').textContent=score+' / '+stored.total;
  document.getElementById('scoreBar').style.width=(score/stored.total*100)+'%';
  const pct=Math.round(score/stored.total*100);
  document.getElementById('scoreMsg').textContent=pct+'% 正答率'+(pct>=80?' — 素晴らしい！🎉':pct>=50?' — いい調子！':' — 復習して次に活かそう💪');
}

let html='';
answers.forEach((a,i)=>{
  const numCls=stored?((stored.answers[i]&&JSON.stringify(stored.answers[i])===JSON.stringify(answers[i].sentence.replace(answers[i].sentence,''))?'correct':'default')):'default';
  html+='<div class="q-card"><div class="q-header"><div class="q-num default">'+(i+1)+'</div><div class="q-prompt">"'+a.prompt+'"</div></div>'
    +'<div class="q-body"><div class="q-sentence">→ '+a.sentence+'</div>'
    +'<div class="q-grammar">📝 '+a.grammar+'</div></div></div>';
});
document.getElementById('qList').innerHTML=html;
</script>
</body>
</html>

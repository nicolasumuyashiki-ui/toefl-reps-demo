<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;color:#0F1511;line-height:1.7}
.top-nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;justify-content:space-between}.top-nav-left{display:flex;align-items:center;gap:16px;font-size:.9em;color:#4a5568}.top-nav-left strong{color:#0F1511}.top-nav-right{display:flex;align-items:center;gap:12px}
.timer-btn{background:none;border:1px solid #cbd5e0;border-radius:6px;padding:6px 14px;font-size:.85em;color:#4a5568;cursor:pointer;font-family:inherit}.timer-btn:hover{background:#f7fafc}.timer-display{font-family:'Courier New',monospace;font-size:.9em;color:#0F1511;font-weight:600;min-width:60px;text-align:center}
.review-btn{background:#4a90d9;color:#fff;border:none;border-radius:14px;padding:6px 18px;font-size:.85em;cursor:pointer;font-family:inherit;font-weight:600}.review-btn:hover{background:#3a7bc8}
.user-badge{font-size:.8em;color:#718096}.user-badge strong{color:#0F1511}
.progress-bar{height:4px;background:#ebf4ff;width:100%}.progress-fill{height:100%;width:50%;background:#3182ce;border-radius:2px}
.main{flex:1;display:flex;justify-content:center;padding:40px 24px 120px}.content{width:100%;max-width:660px}
.direction{font-weight:700;font-size:1em;color:#0F1511;margin-bottom:24px}
.set-label{display:inline-block;background:#ebf4ff;color:#4a90d9;font-size:.78em;font-weight:600;padding:3px 12px;border-radius:10px;margin-bottom:12px}
.passage{font-size:.95em;line-height:2.2;color:#0F1511}.word-blank{display:inline-block;white-space:nowrap;margin-right:.45em}.sh{font-size:.95em;margin-right:.22em}
.bx{display:inline-block;width:1.5em;height:1.9em;border:1px solid #bbb;border-radius:2px;background:#ececec;text-align:center;vertical-align:baseline;margin:0 .5px;position:relative}
.bx input{width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:1em;font-family:inherit;outline:none;padding:0;color:#0F1511}.bx:focus-within{background:#dce8f7;border-color:#4a90d9}
.reading-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.footer-left{font-size:.82em;color:#718096}.footer-right{display:flex;gap:12px}
.btn-nav{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-size:.95em;font-family:inherit;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-back{color:#4a5568;background:#fff;border:1px solid #e2e8f0}.btn-back:hover{background:#f7fafc}
.btn-next{color:#fff;background:#0F1511}.btn-next:hover{opacity:.9}
.btn-menu{color:#5A6861;background:none;border:1px solid #dfe3e8;font-size:.82em;padding:8px 14px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer}.btn-menu:hover{background:#f5f7fa}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:center}.overlay.active{display:flex}
.review-panel{background:#fff;border-radius:12px;width:90%;max-width:520px;max-height:80vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.review-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #e2e8f0}.review-header h3{font-size:1em;color:#0F1511}
.review-close{background:none;border:none;font-size:1.3em;cursor:pointer;color:#718096;padding:4px 8px;border-radius:4px}.review-close:hover{background:#f7fafc}
.review-body{padding:20px;max-height:50vh;overflow-y:auto}
.review-row{display:flex;padding:10px 0;border-bottom:1px solid #f0f0f0;align-items:center;font-size:.88em}
.review-no{width:28px;color:#718096;font-weight:500}.review-word{flex:1;color:#0F1511}
.review-status{font-size:.78em;padding:2px 10px;border-radius:10px}.review-status.filled{background:#c6f6d5;color:#22543d}.review-status.empty{background:#fed7d7;color:#9b2c2c}
.set-progress{padding:16px 20px;border-top:1px solid #e2e8f0;background:#f9fafb;display:flex;justify-content:center}
.set-progress-row{display:flex;gap:8px;align-items:center}
.set-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72em;font-weight:700}
.set-dot.done{background:#c6f6d5;color:#22543d}.set-dot.current{background:#4a90d9;color:#fff}.set-dot.upcoming{background:#e2e8f0;color:#718096}
.set-dot-line{width:40px;height:2px;background:#e2e8f0}
</style>
</head>
<body data-lang="jp">
<div class="tck-lang-toggle" data-bilingual-toggle style="position:fixed;top:12px;right:12px;z-index:9999;background:#fff;border:1px solid #e2e8f0;border-radius:999px;padding:3px;font-family:Manrope,system-ui,sans-serif;font-size:.72em;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.08)"><button type="button" data-lang-btn="jp" class="active" style="border:none;background:#007646;color:#fff;padding:5px 12px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:inherit">日本語</button><button type="button" data-lang-btn="en" style="border:none;background:transparent;color:#5A6861;padding:5px 12px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:inherit">EN</button></div>
<div class="top-nav"><div class="top-nav-left"><span>Set <strong>1</strong> of 2</span><span>Complete the Words</span></div><div class="top-nav-right"><button class="timer-btn" id="timerToggle"><span class="jp">時間を隠す</span><span class="en">Hide Time</span></button><span class="timer-display" id="timerDisplay">10:00</span><button class="review-btn" id="reviewOpen"><span class="jp">レビュー</span><span class="en">Review</span></button><span class="user-badge" id="userBadge"></span></div></div>
<div class="progress-bar"><div class="progress-fill"></div></div>
<div class="main"><div class="content"><span class="set-label">Set 1 / 2 — The Spread of Public Libraries</span><p class="direction">In the paragraph below, some words are missing letters. Fill in the blanks to complete the words.</p><div class="passage" id="passage"></div></div></div>
<div class="reading-footer"><div><button class="btn-menu" onclick="window.location.href='../../menu.html'"><span class="jp">← メニューに戻る</span><span class="en">← Back to menu</span></button></div><div class="footer-right"><button class="btn-nav btn-next" onclick="goNext()">Next Set ›</button></div></div>
<div class="overlay" id="overlay"><div class="review-panel"><div class="review-header"><h3><span class="jp">レビュー</span><span class="en">Review</span> — Set 1</h3><button class="review-close" id="reviewClose">&times;</button></div><div class="review-body" id="reviewBody"></div><div class="set-progress"><div class="set-progress-row"><div class="set-dot current">1</div><div class="set-dot-line"></div><div class="set-dot upcoming">2</div></div></div></div></div>
<script src="../../js/api.js"></script><script src="../../js/auth.js"></script><script src="../../js/review-mode.js"></script>
<script>
var SET_NUM=1;var NEXT_PAGE="practice-1-set-2.html";var D={"intro": "Public libraries have played an important role in education for centuries. In the past, books were expensive, and only wealthy families could afford to collect them. Over time, leaders recognized that sharing knowledge with everyone would benefit society.", "conclusion": "These efforts transformed how ordinary citizens gained access to information and education.", "target": [{"w": "Several", "a": "ral", "s": "Seve", "p": ""}, {"w": "countries", "a": null, "s": null, "p": ""}, {"w": "gradually", "a": "lly", "s": "gradua", "p": ""}, {"w": "established", "a": null, "s": null, "p": ""}, {"w": "free", "a": "ee", "s": "fr", "p": ""}, {"w": "reading", "a": null, "s": null, "p": ""}, {"w": "rooms", "a": "oms", "s": "ro", "p": ""}, {"w": "where", "a": null, "s": null, "p": ""}, {"w": "ordinary", "a": "ary", "s": "ordin", "p": ""}, {"w": "citizens", "a": null, "s": null, "p": ""}, {"w": "could", "a": "ld", "s": "cou", "p": ""}, {"w": "access", "a": null, "s": null, "p": ""}, {"w": "information", "a": "tion", "s": "informa", "p": ""}, {"w": "and", "a": null, "s": null, "p": ""}, {"w": "expand", "a": "pand", "s": "ex", "p": ""}, {"w": "their", "a": null, "s": null, "p": ""}, {"w": "knowledge", "a": "dge", "s": "knowle", "p": ""}, {"w": "of", "a": null, "s": null, "p": ""}, {"w": "the", "a": "he", "s": "t", "p": ""}, {"w": "world", "a": null, "s": null, "p": "."}]};
if(typeof Auth!=='undefined'){Auth.require();Auth.showBadge('userBadge');} if(window.Review){Review.attachReviewControls({task:'ctw',set:SET_NUM,answersUrl:'ctw-answers.html'});}
(function(){var h='<span>'+D.intro+'</span> ';D.target.forEach(function(t){if(t.a!==null){h+='<span class="word-blank"><span class="sh">'+t.s+'</span><span class="boxes">';for(var j=0;j<t.a.length;j++){h+='<span class="bx"><input type="text" maxlength="1" data-idx="'+j+'" autocomplete="off" autocorrect="off" autocapitalize="off" inputmode="latin" lang="en" spellcheck="false"></span>';}h+='</span>';if(t.p)h+=t.p;h+='</span> ';}else{h+=t.w+(t.p||'')+' ';}});h+='<span>'+D.conclusion+'</span>';document.getElementById('passage').innerHTML=h;
var boxes=document.querySelectorAll('.bx input');boxes.forEach(function(inp,i){inp.addEventListener('input',function(){var v=this.value,f=v.replace(/[^A-Za-z]/g,'');if(v!==f)this.value=f;if(this.value.length===1&&i<boxes.length-1)boxes[i+1].focus();});inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&this.value===''&&i>0)boxes[i-1].focus();});});})();
(function(){var s=10*60,el=document.getElementById('timerDisplay'),btn=document.getElementById('timerToggle'),v=true;setInterval(function(){if(s>0)s--;var m=Math.floor(s/60),ss=s%60;el.textContent=m+':'+(ss<10?'0':'')+ss;},1000);btn.addEventListener('click',function(){v=!v;el.style.display=v?'':'none';btn.textContent=v?'Hide Time':'Show Time';});})();
(function(){var ov=document.getElementById('overlay');document.getElementById('reviewOpen').addEventListener('click',function(){ov.classList.add('active');renderReview();});document.getElementById('reviewClose').addEventListener('click',function(){ov.classList.remove('active');});ov.addEventListener('click',function(e){if(e.target===ov)ov.classList.remove('active');});
window.renderReview=function(){var body=document.getElementById('reviewBody');var blanks=D.target.filter(function(t){return t.a!==null;});var ai=document.querySelectorAll('.bx input');var html='',idx=0;blanks.forEach(function(b,i){var ua='';for(var j=0;j<b.a.length;j++){ua+=(ai[idx]?ai[idx].value:'');idx++;}var f=ua.trim().length>0;html+='<div class="review-row"><span class="review-no">'+(i+1)+'</span><span class="review-word">'+b.s+(f?ua:'___')+'</span><span class="review-status '+(f?'filled':'empty')+'">'+(f?'Answered':'Empty')+'</span></div>';});body.innerHTML=html;};})();
function goNext(){var blanks=D.target.filter(function(t){return t.a!==null;});var ai=document.querySelectorAll('.bx input');var idx=0,ua=[],sc=0;blanks.forEach(function(b){var ans='';for(var j=0;j<b.a.length;j++){ans+=(ai[idx]?ai[idx].value:'');idx++;}ua.push(ans);if(ans.toLowerCase()===b.a.toLowerCase())sc++;});var attempt={answers:ua,score:sc,total:blanks.length,words:blanks.map(function(b){return b.w;})};sessionStorage.setItem('ctw_answers_'+SET_NUM,JSON.stringify(attempt));if(window.Review){Review.markDone('ctw',SET_NUM);Review.saveAttempt('ctw',SET_NUM,attempt);}if(typeof Auth!=='undefined')Auth.completeSet(SET_NUM);if(typeof Api!=='undefined'&&Api.saveAnswers){try{Api.saveAnswers('CTW P1 Set '+SET_NUM,ua,sc,{harderCorrect:0,harderTotal:0,attemptNumber:1});}catch(e){}}window.location.href=NEXT_PAGE;}
</script>
<script>
(function(){
  if (window.__bilingualBooted) return;
  window.__bilingualBooted = true;
  var stored = (typeof localStorage!=='undefined' && localStorage.getItem('tck_lang')) || 'jp';
  setLang(stored);
  document.querySelectorAll('[data-lang-btn]').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang-btn')); });
  });
  function setLang(l){
    document.body.setAttribute('data-lang', l);
    document.documentElement.setAttribute('lang', l === 'jp' ? 'ja' : 'en');
    try { localStorage.setItem('tck_lang', l); } catch(e){}
    document.querySelectorAll('[data-lang-btn]').forEach(function(b){
      var on = b.getAttribute('data-lang-btn') === l;
      b.classList.toggle('active', on);
      b.style.background = on ? '#007646' : 'transparent';
      b.style.color = on ? '#fff' : '#5A6861';
    });
  }
})();
</script>
